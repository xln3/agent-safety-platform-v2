services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-agent_safety_2026}
      MYSQL_DATABASE: ${DB_NAME:-agent_safety_platform}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-agent_safety_2026}
      DB_NAME: ${DB_NAME:-agent_safety_platform}
      SERVER_PORT: 3002
      NODE_ENV: production
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      LLM_API_BASE_URL: ${LLM_API_BASE_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_JUDGE_MODEL: ${LLM_JUDGE_MODEL:-gpt-4o-mini}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - venvs_data:/app/eval-engine/.venvs
      - datasets_data:/app/eval-engine/datasets-cache
      - results_data:/app/eval-engine/results

volumes:
  mysql_data:
  venvs_data:
  datasets_data:
  results_data:
